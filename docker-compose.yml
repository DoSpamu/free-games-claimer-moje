# start with `docker compose up`
services:
  free-games-claimer:
    container_name: fgc
    image: ghcr.io/dospamu/free-games-claimer:master
    build: .
    restart: unless-stopped
    healthcheck:
      test: curl --fail http://localhost:6080 || exit 1
      interval: 30s
      timeout: 10s
      start_period: 20s
      retries: 3
    ports:
      - "6080:6080"  # noVNC — browser inside container (first login)
      - "7080:7080"  # control panel (always running)
    volumes:
      - /mnt/data/fgc:/fgc/data
    labels:
      com.centurylinklabs.watchtower.enable: "false"
    environment:
      TZ: Europe/Warsaw
      BROWSER_TYPE: "firefox"

      # ── Scheduler ─────────────────────────────────────────────────────────────
      LOOP: "86400"  # run claimers every N seconds (86400 = daily); 0 to disable
      # CLAIM_CMD: "node gog.js; node prime-gaming.js; node epic-games.js; node steam.js; node microsoft.js"
      # CLAIM_CMD_MANUAL: "node gog.js; node prime-gaming.js; node epic-games.js; node steam.js"

      # ── Reverse proxy (uncomment if panel is served under a subfolder) ─────────
      # BASE_PATH: /fgc
      # PUBLIC_URL: https://yourserver.com/fgc

      # ── Shared credentials ────────────────────────────────────────────────────
      # EMAIL: your@email.com
      # PASSWORD: yourpassword

      # ── Epic Games ────────────────────────────────────────────────────────────
      # EG_EMAIL: ""
      # EG_PASSWORD: ""
      # EG_OTPKEY: ""

      # ── Prime Gaming ─────────────────────────────────────────────────────────
      # PG_EMAIL: ""
      # PG_PASSWORD: ""
      # PG_OTPKEY: ""

      # ── GOG ───────────────────────────────────────────────────────────────────
      # GOG_EMAIL: ""
      # GOG_PASSWORD: ""

      # ── Steam ─────────────────────────────────────────────────────────────────
      # STEAM_EMAIL: ""
      # STEAM_PASSWORD: ""
      # STEAM_OTPKEY: ""
      # STEAM_MIN_RATING: "6"   # 1–9; 6 = Mostly Positive
      # STEAM_MIN_PRICE: "10"   # minimum original price in USD

      # ── Microsoft Rewards ─────────────────────────────────────────────────────
      # MS_EMAIL: ""
      # MS_PASSWORD: ""
      # MS_OTPKEY: ""

      # ── Notifications ─────────────────────────────────────────────────────────
      # TG_TOKEN: ""
      # TG_CHAT_ID: ""
      # DISCORD_WEBHOOK: ""

      # ── Opt-in services (disabled by default) ────────────────────────────────
      # UBISOFT_ACTIVE: "1"
      # AE_ACTIVE: "1"
